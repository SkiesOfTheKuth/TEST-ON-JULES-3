apiVersion: 1

groups:
  - orgId: 1
    name: Gateway Alerts
    folder: Observability
    interval: 1m
    rules:
      - uid: gateway-latency-high
        title: Gateway latency above threshold
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: timeSeriesQuery
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: histogram_quantile(0.95, sum(rate(calculator_gateway_request_latency_seconds_bucket[5m])) by (le))
              interval: ""
              intervalFactor: 2
              legendFormat: p95
              maxDataPoints: 43200
              refId: A
              instant: false
              range: true
          - refId: B
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: A
              type: reduce
              reducer: last
          - refId: C
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: B > 0.2
              type: math
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Gateway p95 latency above 200ms
        labels:
          severity: warning
      - uid: gateway-error-rate-spike
        title: Gateway error rate spike
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: timeSeriesQuery
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(rate(calculator_gateway_requests_total{status=~"5..|4.."}[5m])) / sum(rate(calculator_gateway_requests_total[5m]))
              interval: ""
              intervalFactor: 2
              legendFormat: error_rate
              maxDataPoints: 43200
              refId: A
              instant: false
              range: true
          - refId: B
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: A
              type: reduce
              reducer: last
          - refId: C
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: B > 0.1
              type: math
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Error rate exceeded 10%
        labels:
          severity: critical
      - uid: gateway-rate-limit-saturation
        title: Rate-limit saturation detected
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: timeSeriesQuery
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(increase(calculator_gateway_rate_limit_rejections[5m]))
              interval: ""
              intervalFactor: 2
              legendFormat: rejections
              maxDataPoints: 43200
              refId: A
              instant: false
              range: true
          - refId: B
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: A
              type: reduce
              reducer: last
          - refId: C
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: B > 50
              type: math
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: More than 50 rejections in the last 5 minutes
        labels:
          severity: warning
  - orgId: 1
    name: Evaluator Alerts
    folder: Observability
    interval: 1m
    rules:
      - uid: evaluator-runtime-slow
        title: Evaluator runtime degradation
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: timeSeriesQuery
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: histogram_quantile(0.95, sum(rate(calculator_safe_evaluator_evaluation_duration_seconds_bucket[5m])) by (le))
              interval: ""
              intervalFactor: 2
              legendFormat: p95
              maxDataPoints: 43200
              refId: A
              instant: false
              range: true
          - refId: B
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: A
              type: reduce
              reducer: last
          - refId: C
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: B > 0.2
              type: math
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Evaluator p95 runtime above 200ms
        labels:
          severity: warning
      - uid: evaluator-sandbox-failure-surge
        title: Sandbox failure surge
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: timeSeriesQuery
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(rate(calculator_safe_evaluator_sandbox_restarts_total[5m]))
              interval: ""
              intervalFactor: 2
              legendFormat: failures
              maxDataPoints: 43200
              refId: A
              instant: false
              range: true
          - refId: B
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: A
              type: reduce
              reducer: last
          - refId: C
            datasourceUid: -100
            queryType: math
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expression: B > 0.1
              type: math
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Sandbox restart rate above 0.1/s
        labels:
          severity: critical

apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-primary
    receivers:
      - uid: slack-primary
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          text: '{{ template "slack.default.message" . }}'
  - orgId: 1
    name: email-ops
    receivers:
      - uid: email-ops
        type: email
        settings:
          addresses: ${ALERT_EMAIL_RECIPIENTS}

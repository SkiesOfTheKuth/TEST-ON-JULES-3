<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Web Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Calculator Section -->
            <div class="col-md-8 col-lg-9">
                <div class="calculator-container">
                    <div class="calculator card shadow-lg">
                        <div class="card-body">
                            <h1 class="card-title text-center mb-4">Advanced Calculator</h1>
                            <div class="display-container">
                                <input type="text" class="form-control display" id="display" readonly>
                            </div>
                            <div class="buttons">
                                <div class="row g-2">
                                    <!-- Functions -->
                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="sin(">sin</button></div>
                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="cos(">cos</button></div>
                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="tan(">tan</button></div>
                                    <div class="col-3"><button class="btn btn-danger w-100" data-value="C">C</button></div>

                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="log(">log</button></div>
                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="log10(">log10</button></div>
                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="sqrt(">sqrt</button></div>
                                    <div class="col-3"><button class="btn btn-warning w-100" data-value="/">/</button></div>

                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="abs(">abs</button></div>
                                    <div class="col-3"><button class="btn btn-secondary w-100" data-value="round(">round</button></div>
                                    <div class="col-3"><button class="btn btn-info w-100" data-value="pi">π</button></div>
                                    <div class="col-3"><button class="btn btn-warning w-100" data-value="*">*</button></div>

                                    <div class="col-3"><button class="btn btn-light w-100" data-value="7">7</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value="8">8</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value="9">9</button></div>
                                    <div class="col-3"><button class="btn btn-warning w-100" data-value="-">-</button></div>

                                    <div class="col-3"><button class="btn btn-light w-100" data-value="4">4</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value="5">5</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value="6">6</button></div>
                                    <div class="col-3"><button class="btn btn-warning w-100" data-value="+">+</button></div>

                                    <div class="col-3"><button class="btn btn-light w-100" data-value="1">1</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value="2">2</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value="3">3</button></div>
                                    <div class="col-3"><button class="btn btn-info w-100" data-value="e">e</button></div>

                                    <div class="col-3"><button class="btn btn-light w-100" data-value="0">0</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value=".">.</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value="(">(</button></div>
                                    <div class="col-3"><button class="btn btn-light w-100" data-value=")">)</button></div>

                                    <div class="col-12"><button class="btn btn-success w-100" data-value="=">=</button></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History Section -->
            <div class="col-md-4 col-lg-3">
                <div class="history-container card shadow-lg">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">History</h2>
                        <ul class="list-group" id="history-list">
                            <!-- History items will be added here -->
                        </ul>
                        <button class="btn btn-outline-danger mt-3 w-100" id="clear-history">Clear History</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Web Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="calculator-container">
        <div class="display-container">
            <input type="text" id="display" class="display" value="0" readonly>
        </div>
        <div class="buttons-grid">
            <!-- Row 1: Functions -->
            <button class="btn function" data-value="sind(">sin</button>
            <button class="btn function" data-value="cosd(">cos</button>
            <button class="btn function" data-value="tand(">tan</button>
            <button class="btn function" data-value="log10(">log10</button>
            <button class="btn function" data-value="factorial(">n!</button>

            <!-- Row 2: Inverse & Hyperbolic -->
            <button class="btn function" data-value="asin(">asin</button>
            <button class="btn function" data-value="acos(">acos</button>
            <button class="btn function" data-value="atan(">atan</button>
            <button class="btn function" data-value="log(">ln</button>
            <button class="btn function" data-value="sqrt(">√</button>

            <!-- Row 3: Memory & Brackets -->
            <button class="btn operator" data-value="pi">π</button>
            <button class="btn operator" data-value="e">e</button>
            <button class="btn operator" data-value="(">(</button>
            <button class="btn operator" data-value=")">)</button>
            <button class="btn operator" data-value="**">^</button>

            <!-- Row 4: Main Pad -->
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-value="/">÷</button>
            <button class="btn clear" data-value="C">C</button>

            <!-- Row 5: Main Pad -->
            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-value="*">×</button>
            <button class="btn backspace" data-value="Backspace">⌫</button>

            <!-- Row 6: Main Pad -->
            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-value="-">−</button>
            <button class="btn equals" data-value="=" rowspan="2">=</button>

            <!-- Row 7: Main Pad -->
            <button class="btn number zero" data-value="0">0</button>
            <button class="btn number" data-value=".">.</button>
            <button class="btn operator" data-value="+">+</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

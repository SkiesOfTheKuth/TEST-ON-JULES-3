<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="app-header">
        <h1>Calculator</h1>
        <p role="status" aria-live="polite" id="message" class="visually-hidden"></p>
    </header>
    <main class="calculator" role="application" aria-label="Calculator">
        <output class="display" id="display" role="status" aria-live="polite">0</output>
        <div class="buttons" role="group" aria-label="Calculator buttons">
            <button class="btn function" data-value="sqrt(" aria-label="Square root">√</button>
            <button class="btn function" data-value="power(" aria-label="Power function">pow</button>
            <button class="btn operator" data-value="C">C</button>
            <button class="btn operator" data-value="(">(</button>
            <button class="btn operator" data-value=")">)</button>
            <button class="btn operator" data-value="/">/</button>

            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>
            <button class="btn operator" data-value="*">*</button>

            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>
            <button class="btn operator" data-value="-">-</button>

            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn zero" data-value="0">0</button>
            <button class="btn" data-value=".">.</button>
            <button class="btn equals" data-value="=">=</button>
        </div>
    </main>
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>

name: Phase 2 CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: "Run optional load tests"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"
  COMPOSE_FILE: docker-compose.phase2.yml

jobs:
  lint-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install gateway dependencies
        run: poetry -C services/gateway install --with dev

      - name: Install safe evaluator dependencies
        run: poetry -C services/safe_evaluator install --with dev

      - name: Run lint
        run: make lint

      - name: Run unit tests
        run: make unit

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Ensure change log updated
        if: github.event_name == 'pull_request'
        run: python scripts/ensure_changelog_updated.py

      - name: Upload gateway coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-unit-coverage
          path: services/gateway/coverage.xml

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-unit
    env:
      TEST_GATEWAY_API_KEY: ci-integration-key
      GATEWAY_DATABASE__URL: postgresql+asyncpg://calculator:calculator@localhost:5432/calculator
      GATEWAY_REDIS__URL: redis://localhost:6379/0
      GATEWAY_OBSERVABILITY__OTLP_ENDPOINT: ""
      GATEWAY_JOB__CACHE_NAMESPACE: jobs
      GATEWAY_JOB__NOTIFICATION_NAMESPACE: job_events
      GATEWAY_ENVIRONMENT: development
      GATEWAY_TEST_BASE_URL: http://localhost:8080
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install gateway dependencies
        run: poetry -C services/gateway install --with dev

      - name: Install safe evaluator dependencies
        run: poetry -C services/safe_evaluator install --with dev

      - name: Launch Phase 2 stack
        run: docker compose up --build -d postgres redis safe-evaluator worker-standard worker-priority worker-gpu gateway tempo loki promtail prometheus grafana

      - name: Wait for gateway readiness
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:8080/health/ready; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway failed to become ready" >&2
          exit 1

      - name: Apply database migrations
        run: poetry -C services/gateway run alembic upgrade head

      - name: Seed integration API key
        run: poetry -C services/gateway run python -m app.scripts.seed_api_key --api-key "$TEST_GATEWAY_API_KEY" --owner "CI Pipeline" --scopes calculate --force

      - name: Run integration test suite
        env:
          PYTEST_ADDOPTS: "-m integration --maxfail=1"
        run: poetry -C services/gateway run pytest tests/integration

      - name: Collect docker logs
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans -v

  load-test:
    name: Load Test (Optional)
    runs-on: ubuntu-latest
    needs: integration
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_load_tests == 'true') ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-load-tests')) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      }}
    env:
      TEST_GATEWAY_API_KEY: ci-load-key
      GATEWAY_DATABASE__URL: postgresql+asyncpg://calculator:calculator@localhost:5432/calculator
      GATEWAY_REDIS__URL: redis://localhost:6379/0
      GATEWAY_ENVIRONMENT: development
      GATEWAY_OBSERVABILITY__OTLP_ENDPOINT: ""
      GATEWAY_TEST_BASE_URL: http://localhost:8080
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install gateway dependencies
        run: poetry -C services/gateway install --with dev

      - name: Launch stack
        run: docker compose up --build -d postgres redis safe-evaluator worker-standard worker-priority worker-gpu gateway tempo loki promtail prometheus grafana

      - name: Wait for gateway readiness
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:8080/health/ready; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway failed to become ready" >&2
          exit 1

      - name: Apply database migrations
        run: poetry -C services/gateway run alembic upgrade head

      - name: Seed API key for load test
        run: poetry -C services/gateway run python -m app.scripts.seed_api_key --api-key "$TEST_GATEWAY_API_KEY" --owner "CI Load" --scopes calculate --force

      - name: Execute Locust smoke test
        env:
          API_KEY: ${{ env.TEST_GATEWAY_API_KEY }}
          HOST: http://localhost:8080
          USERS: 25
          SPAWN_RATE: 10
          RUN_TIME: 3m
        run: make load-test

      - name: Collect docker logs
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans -v
